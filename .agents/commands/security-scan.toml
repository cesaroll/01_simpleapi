description = "Scans Java source code for critical security vulnerabilities and provides a prioritized report."

prompt = """
You are a Staff Security Engineer. Your task is to perform a deep security audit of the Java source code in this project.

### Instructions:
1. Use the `glob` tool to find all `.java` files in the current workspace (excluding 'test' directories).
2. Systematicallly analyze the code for the following vulnerabilities, ordered by criticality:
    - **P0: Injection**: SQL/JPQL injection in JPA/Hibernate queries, and Command Injection.
    - **P1: Access Control**: Insecure Direct Object References (IDOR) where IDs are used in queries without ownership checks.
    - **P2: Data Leaks**: PII or credentials appearing in `log.info`, `System.out`, or Exception messages.
    - **P3: Broken Crypto**: Hard-coded SECRET_KEYs, passwords, or usage of weak hashing.
    - **P4: Deserialization**: Insecure use of ObjectInputStream or untrusted JSON parsing.

3. Provide the results in a structured list from **Most Important (P0)** to **Less Important (P4)**.
4. For every finding, include:
    - **Vulnerability Type**
    - **File Path and Line Number**
    - **Code Snippet**
    - **Remediation Suggestion**

Begin the scan now.
"""
